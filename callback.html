<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Auth Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040f;color:#00d4ff;font-family:monospace;padding:24px;font-size:13px;line-height:1.8;}
h2{color:#fff;margin-bottom:16px;font-size:16px;}
.section{margin-bottom:20px;background:rgba(0,180,255,.05);border:1px solid rgba(0,180,255,.2);border-radius:8px;padding:16px;}
.label{color:rgba(0,180,255,.5);font-size:11px;letter-spacing:2px;margin-bottom:6px;}
.value{color:#6ee7b7;word-break:break-all;white-space:pre-wrap;}
.error{color:#fca5a5;}
.ok{color:#6ee7b7;}
</style>
</head>
<body>
<h2>🔍 AUTH CALLBACK DEBUG</h2>

<div class="section">
  <div class="label">FULL URL</div>
  <div class="value" id="full-url"></div>
</div>
<div class="section">
  <div class="label">URL HASH (#...)</div>
  <div class="value" id="url-hash"></div>
</div>
<div class="section">
  <div class="label">URL SEARCH (?...)</div>
  <div class="value" id="url-search"></div>
</div>
<div class="section">
  <div class="label">SUPABASE getSession() RESULT</div>
  <div class="value" id="session-result">checking...</div>
</div>
<div class="section">
  <div class="label">onAuthStateChange EVENTS</div>
  <div class="value" id="auth-events">waiting...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://alvldkihwuhgjbgdpbkg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsdmxka2lod3VoZ2piZ2RwYmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTYxNjQsImV4cCI6MjA5Njc5MjE2NH0.jnW_h8wZlcf02poGB_cjOl3gipM8PqeEepsXf7MUA0U';

// Show raw URL info
document.getElementById('full-url').textContent   = window.location.href;
document.getElementById('url-hash').textContent   = window.location.hash   || '(empty)';
document.getElementById('url-search').textContent = window.location.search || '(empty)';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Watch auth events
const eventsEl = document.getElementById('auth-events');
let eventLog = [];
sb.auth.onAuthStateChange((event, session) => {
  eventLog.push(`EVENT: ${event} | session: ${session ? 'YES — user: ' + session.user.email : 'NO'}`);
  eventsEl.textContent = eventLog.join('\n');
});

// Try getSession at 1s, 3s, 6s
async function checkSession(label){
  const { data: { session }, error } = await sb.auth.getSession();
  const el = document.getElementById('session-result');
  const line = `[${label}] ${session ? '✅ SESSION FOUND: ' + session.user.email : '❌ NO SESSION'} ${error ? '| ERROR: '+error.message : ''}`;
  el.textContent = (el.textContent === 'checking...' ? '' : el.textContent + '\n') + line;
  el.className = 'value ' + (session ? 'ok' : 'error');
}

setTimeout(() => checkSession('1s'), 1000);
setTimeout(() => checkSession('3s'), 3000);
setTimeout(() => checkSession('6s'), 6000);
</script>
</body>
</html>
