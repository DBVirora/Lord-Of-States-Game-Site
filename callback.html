<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lord of Courts VCU — Authenticating...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040f;color:#00d4ff;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.glyph svg{width:60px;height:60px;animation:spin 2s linear infinite;filter:drop-shadow(0 0 8px #00d4ff);}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:12px;letter-spacing:4px;color:rgba(0,180,255,.7);}
.sub{font-size:10px;letter-spacing:2px;color:rgba(0,180,255,.3);}
.dot{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="glyph">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="32,4 60,18 60,46 32,60 4,46 4,18" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity=".6"/>
    <circle cx="32" cy="32" r="6" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <circle cx="32" cy="32" r="2" fill="#00d4ff"/>
  </svg>
</div>
<div class="msg">AUTHENTICATING<span class="dot">...</span></div>
<div class="sub" id="status-msg">Verifying credentials</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://alvldkihwuhgjbgdpbkg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsdmxka2lod3VoZ2piZ2RwYmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTYxNjQsImV4cCI6MjA5Njc5MjE2NH0.jnW_h8wZlcf02poGB_cjOl3gipM8PqeEepsXf7MUA0U';
const SETUP_URL         = 'https://dbvirora.github.io/Lord-Of-States-Game-Site/setup.html';
const GAME_URL          = 'https://dbvirora.github.io/Lord-Of-States-Game-Site/game.html';
const LOGIN_URL         = 'https://dbvirora.github.io/Lord-Of-States-Game-Site/';

const statusEl = document.getElementById('status-msg');
function setStatus(msg){ statusEl.textContent = msg; }

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let routed = false; // prevent double-redirect

async function routeUser(session){
  if(routed) return;
  routed = true;
  setStatus('Checking profile...');
  try {
    const { data: profile } = await sb
      .from('profiles')
      .select('username')
      .eq('id', session.user.id)
      .single();

    if(!profile || !profile.username){
      setStatus('First time here — setting up your profile...');
      setTimeout(() => window.location.replace(SETUP_URL), 600);
    } else {
      setStatus('Welcome back! Entering game...');
      setTimeout(() => window.location.replace(GAME_URL), 600);
    }
  } catch(err){
    // profiles query failed — send to setup to be safe
    setStatus('Setting up your account...');
    setTimeout(() => window.location.replace(SETUP_URL), 600);
  }
}

// PRIMARY METHOD: onAuthStateChange fires when Supabase
// finishes parsing the token from the URL hash (Discord implicit flow)
// or exchanges the code (Google PKCE flow)
sb.auth.onAuthStateChange((event, session) => {
  console.log('Auth event:', event, session ? 'session found' : 'no session');
  if((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session){
    routeUser(session);
  }
});

// FALLBACK: also check getSession() after a delay in case
// the auth state change already fired before our listener attached
setTimeout(async () => {
  if(routed) return;
  setStatus('Checking session...');
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    routeUser(session);
  } else {
    // Still nothing after 5s — something went wrong
    setStatus('Could not verify session — returning to login...');
    setTimeout(() => window.location.replace(LOGIN_URL), 1500);
  }
}, 5000);

</script>
</body>
</html>
