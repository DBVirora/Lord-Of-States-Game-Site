<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lord of Courts VCU — Authenticating...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040f;color:#00d4ff;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.glyph svg{width:60px;height:60px;animation:spin 2s linear infinite;filter:drop-shadow(0 0 8px #00d4ff);}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:12px;letter-spacing:4px;color:rgba(0,180,255,.7);}
.sub{font-size:10px;letter-spacing:2px;color:rgba(0,180,255,.3);}
.dot{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#music-btn{position:fixed;bottom:16px;right:16px;background:rgba(0,20,40,.7);border:1px solid rgba(0,150,220,.3);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
</style>
</head>
<body>
<div class="glyph">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="32,4 60,18 60,46 32,60 4,46 4,18" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity=".6"/>
    <circle cx="32" cy="32" r="6" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <circle cx="32" cy="32" r="2" fill="#00d4ff"/>
  </svg>
</div>
<div class="msg">AUTHENTICATING<span class="dot">...</span></div>
<div class="sub" id="status-msg">Verifying credentials</div>
<button id="music-btn" title="Toggle Music">🔊</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://alvldkihwuhgjbgdpbkg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsdmxka2lod3VoZ2piZ2RwYmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTYxNjQsImV4cCI6MjA5Njc5MjE2NH0.jnW_h8wZlcf02poGB_cjOl3gipM8PqeEepsXf7MUA0U';
const SETUP_URL         = 'https://dbvirora.github.io/Lord-Of-States-Game-Site/setup.html';
const GAME_URL          = 'https://dbvirora.github.io/Lord-Of-States-Game-Site/game.html';
const LOGIN_URL         = 'https://dbvirora.github.io/Lord-Of-States-Game-Site/';
const MUSIC_SRC = 'https://alvldkihwuhgjbgdpbkg.supabase.co/storage/v1/object/sign/Lord%20Of%20States%20Website%20Assets/Audio/LoginMusic.mp3?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8wNjM4YmZjZS05YzliLTRjMjYtOTFhNy1iNGM2OGZhN2NkMDciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb3JkIE9mIFN0YXRlcyBXZWJzaXRlIEFzc2V0cy9BdWRpby9Mb2dpbk11c2ljLm1wMyIsInNjb3BlIjoiZG93bmxvYWQiLCJpYXQiOjE3ODEzMjE2MjcsImV4cCI6NDkzNDkyMTYyN30.h_lT9s3j7K70bGaOy3TE_JjRU_3xHyILAnXIbrGNkyg';
const MUSIC_KEY         = 'vcu_music_pos';
const MUSIC_MUTED_KEY   = 'vcu_music_muted';

// ── MUSIC ─────────────────────────────────────────
let audio = null;
function initMusic(){
  audio = new Audio(MUSIC_SRC);
  audio.loop = false;audio.volume = 0.35;
  const muted = sessionStorage.getItem(MUSIC_MUTED_KEY) === 'true';
  audio.muted = muted;
  document.getElementById('music-btn').textContent = muted ? '🔇' : '🔊';
  const savedPos = parseFloat(sessionStorage.getItem(MUSIC_KEY) || '0');
  audio.addEventListener('loadedmetadata', () => {
    if(savedPos > 0 && savedPos < audio.duration) audio.currentTime = savedPos;
    audio.play().catch(() => {});
  });
  audio.addEventListener('ended', () => {
    sessionStorage.setItem(MUSIC_KEY, '0');
    audio.currentTime = 0;
    audio.play().catch(() => {});
  });
  setInterval(() => {
    if(audio && !audio.paused) sessionStorage.setItem(MUSIC_KEY, audio.currentTime.toString());
  }, 1000);
  audio.load();
}
window.addEventListener('beforeunload', () => {
  if(audio) sessionStorage.setItem(MUSIC_KEY, audio.currentTime.toString());
});
document.getElementById('music-btn').addEventListener('click', () => {
  if(!audio) return;
  audio.muted = !audio.muted;
  sessionStorage.setItem(MUSIC_MUTED_KEY, audio.muted.toString());
  document.getElementById('music-btn').textContent = audio.muted ? '🔇' : '🔊';
});
setTimeout(() => initMusic(), 100);

// ── AUTH ──────────────────────────────────────────
const statusEl = document.getElementById('status-msg');
function setStatus(msg){ statusEl.textContent = msg; }

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let routed = false;

async function routeUser(session){
  if(routed) return;
  routed = true;
  setStatus('Checking profile...');
  try {
    const { data: profile } = await sb.from('profiles')
      .select('username').eq('id', session.user.id).maybeSingle();
    const hasUsername = profile && typeof profile.username === 'string'
      && profile.username.trim().length >= 3;

    if(hasUsername){
      setStatus('Welcome back! Loading game...');
    } else {
      setStatus('First time here — setting up your profile...');
    }

    // KEY FIX: wait for Supabase to fully persist the session to localStorage
    // before navigating away. We verify by calling getSession() again and
    // confirming it returns data, with retries.
    let verified = false;
    for(let i = 0; i < 10; i++){
      await new Promise(r => setTimeout(r, 300));
      const { data: { session: check } } = await sb.auth.getSession();
      if(check && check.user){
        verified = true;
        break;
      }
    }

    if(!verified){
      setStatus('Session could not be verified — please try again.');
      setTimeout(() => window.location.replace(LOGIN_URL), 2000);
      return;
    }

    // Session confirmed in localStorage — safe to navigate
    window.location.replace(hasUsername ? GAME_URL : SETUP_URL);

  } catch(err){
    console.error('routeUser error:', err);
    setStatus('Setting up your account...');
    window.location.replace(SETUP_URL);
  }
}

// PRIMARY: listen for auth state change
sb.auth.onAuthStateChange((event, session) => {
  console.log('[CALLBACK] auth event:', event, session ? session.user.id : 'no session');
  if((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session){
    routeUser(session);
  }
});

// FALLBACK: if event already fired before listener attached
setTimeout(async () => {
  if(routed) return;
  setStatus('Checking session...');
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    routeUser(session);
  } else {
    setStatus('Could not verify session — returning to login...');
    setTimeout(() => window.location.replace(LOGIN_URL), 1500);
  }
}, 5000);
</script>
</body>
</html>
